  - item_id: WCBB-1
    type: bug
    title: PreToolUse hook reads wrong cycle_set state source
    severity: medium
    confidence: 0.95
    suggested_priority: high
    description: |
      During DO phase execution in retro-cycle, PreToolUse hook shows EXPLORE state even though
      cycle_set MCP correctly set state to DO. The hook is reading from a different state source
      than what was written by cycle_set.
    root_cause: |
      State source mismatch between MCP write path and PreToolUse hook read path. Possible causes:
      1. MCP cycle_set writes to haios-status-slim.json but hook reads from different file
      2. Hook reads stale cached state before refresh
      3. State write is not flushed to disk before hook runs
    affected_files:
      - .claude/hooks/pre-tool-use.py
      - mcp__haios-operations__cycle_set
      - .claude/haios/haios-status-slim.json
    impact: |
      Governance enforcement incorrect during execution. Hook cannot validate state transitions
      reliably. Affects retro-cycle and potentially all lifecycle state validation.
    reproduction: |
      Run retro-cycle, observe PreToolUse log showing EXPLORE when cycle_set set DO.
