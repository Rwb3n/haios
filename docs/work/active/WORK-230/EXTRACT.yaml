    title: critique-agent tool set lacks Write capability — critique reports not persisted
    severity: high
    confidence: 0.98
    suggested_priority: high
    description: |
      critique-agent is invoked with tool set that excludes Write operations. Consequently,
      critique reports generated during planning phases are never persisted to critique/ directory.
      They exist in agent memory only and are lost after session ends.
    root_cause: |
      Tool set configuration for critique-agent does not include Write tooling. Governance model
      requires critique artifacts to be persisted for traceability and audit.
    affected_files:
      - agents/critique-agent.md
      - .claude/hooks/pre-tool-use.py
      - implementation-cycle agents
    expected_behavior: |
      critique-agent completes and automatically persists report to {work_id}/critique/{timestamp}.md
    actual_behavior: |
      critique-agent completes but report is not written to disk
    impact: |
      Loss of governance artifacts. Cannot audit critique findings. Prevents post-hoc analysis of
      planning assumptions. Violates traceability chain (L4 Requirement → Artifact).
    affected_workflows:
      - /new-plan command
